<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuentify</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header class="navbar">
    <div class="navbar-logo">Cuentify</div>
    <button class="hamburger" id="hamburgerBtn" aria-label="Menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- TABS -->
  <nav class="tabs">
    <ul class="tabs-list">
      <li class="tab-item active" data-tab="streaming">Streaming</li>
      <li class="tab-item" data-tab="musica">Música</li>
      <li class="tab-item" data-tab="gaming">Gaming</li>
      <li class="tab-item" data-tab="software">Software</li>
      <li class="tab-item" data-tab="internet">Internet</li>
    </ul>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <!-- Content will go here -->
  </main>

  <!-- MENU SHEET (bottom-up panel) -->
  <div class="menu-overlay" id="menuOverlay"></div>
  <div class="menu-sheet" id="menuSheet">
    <div class="menu-sheet-handle"></div>
    <div class="menu-sheet-content">
      <div class="menu-sheet-header">
        <span class="menu-sheet-logo">Cuentify</span>
      </div>
      <div class="menu-auth-section">
        <p class="menu-auth-hint">Accede a tu cuenta para gestionar tus servicios</p>
        <button class="btn-entrar" id="btnEntrar">Entrar</button>
        <!-- Future: Google OAuth button will go here -->
      </div>
      <nav class="menu-nav">
        <a href="#" class="menu-nav-item">Streaming</a>
        <a href="#" class="menu-nav-item">Música</a>
        <a href="#" class="menu-nav-item">Gaming</a>
        <a href="#" class="menu-nav-item">Software</a>
        <a href="#" class="menu-nav-item">Internet</a>
      </nav>
    </div>
  </div>

  <!-- ADMIN BAR (shown when in admin mode) -->
  <div class="admin-bar" id="adminBar">
    <span class="admin-bar-label">● Modo Admin</span>
    <button class="admin-bar-exit" id="adminExitBtn">Salir</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
