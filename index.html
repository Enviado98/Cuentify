<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuentify</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header class="navbar">
    <div class="navbar-logo">Cuentify</div>
    <button class="hamburger" id="hamburgerBtn" aria-label="Menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- TABS -->
  <nav class="tabs">
    <ul class="tabs-list">
      <li class="tab-item active" data-tab="streaming">Streaming</li>
      <li class="tab-item" data-tab="musica">Música</li>
      <li class="tab-item" data-tab="gaming">Gaming</li>
      <li class="tab-item" data-tab="software">Software</li>
      <li class="tab-item" data-tab="internet">Internet</li>
    </ul>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="products-grid" id="productsGrid"></div>
    <div class="products-empty" id="productsEmpty" style="display:none;">
      <p>No hay productos en esta categoría aún.</p>
    </div>
    <div class="products-loading" id="productsLoading">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- MENU SHEET -->
  <div class="menu-overlay" id="menuOverlay"></div>
  <div class="menu-sheet" id="menuSheet">
    <div class="menu-sheet-handle"></div>
    <div class="menu-sheet-content">
      <div class="menu-sheet-header">
        <span class="menu-sheet-logo">Cuentify</span>
      </div>
      <div class="menu-auth-section">
        <p class="menu-auth-hint">Accede a tu cuenta para gestionar tus servicios</p>
        <button class="btn-entrar" id="btnEntrar">Entrar</button>
      </div>
      <nav class="menu-nav">
        <a href="#" class="menu-nav-item" data-tab="streaming">Streaming</a>
        <a href="#" class="menu-nav-item" data-tab="musica">Música</a>
        <a href="#" class="menu-nav-item" data-tab="gaming">Gaming</a>
        <a href="#" class="menu-nav-item" data-tab="software">Software</a>
        <a href="#" class="menu-nav-item" data-tab="internet">Internet</a>
      </nav>
    </div>
  </div>

  <!-- ADMIN BAR -->
  <div class="admin-bar" id="adminBar">
    <span class="admin-bar-label">● Modo Admin</span>
    <div class="admin-bar-actions">
      <button class="admin-bar-add" id="adminAddBtn">+ Nuevo producto</button>
      <button class="admin-bar-exit" id="adminExitBtn">Salir</button>
    </div>
  </div>

  <!-- ADMIN PRODUCT MODAL -->
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-sheet-handle"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Nuevo producto</h2>
        <button class="modal-close" id="modalCloseBtn">✕</button>
      </div>

      <div class="img-upload-area" id="imgUploadArea">
        <input type="file" id="imgInput" accept="image/*" hidden />
        <div class="img-upload-placeholder" id="imgPlaceholder">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>Toca para subir imagen</span>
        </div>
        <img class="img-preview" id="imgPreview" src="" alt="" />
      </div>

      <div class="modal-fields">
        <div class="field-group">
          <label class="field-label">Nombre del producto</label>
          <input class="field-input" id="productName" type="text" placeholder="ej. Netflix Premium" />
        </div>
        <div class="field-group">
          <label class="field-label">Categoría</label>
          <div class="select-wrapper">
            <select class="field-input field-select" id="productCategory">
              <option value="streaming">Streaming</option>
              <option value="musica">Música</option>
              <option value="gaming">Gaming</option>
              <option value="software">Software</option>
              <option value="internet">Internet</option>
            </select>
          </div>
        </div>
      </div>

      <button class="btn-save" id="btnSave">Guardar producto</button>
      <p class="modal-error" id="modalError"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
